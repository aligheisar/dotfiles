font=Roboto Mono:size=11
use-bold=yes
prompt="> "
placeholder="Type someting..."
match-mode=fzf
match-counter=yes
show-actions=yes
terminal=foot -e

lines=15
width=60
tabs=4
horizontal-pad=8
vertical-pad=4
inner-pad=4

line-height=20

[colors]
background=222222ff
text=bbbbbbff
prompt=a189b5ff
placeholder=4a4a4aff
input=ccccccff
match=bb9090ff
selection=333333ff
selection-text=ddddddff
selection-match=cc5050ff
counter=555555ff
border=a189b599

[border]
width=1
radius=4
