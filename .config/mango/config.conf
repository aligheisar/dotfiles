# imports
source=./bind.conf
source=./input.conf
source=./theme.conf
source=./animation.conf
source=./rules.conf

# startup apps
exec-once=nm-applet
exec-once=lxqt-policykit-agent
exec-once=blueman-applet
exec-once=mpd

# bar
exec=bash start-waybar -c ~/.config/waybar/config.mango.jsonc -s ~/.config/waybar/style.mango.css

# idle
exec-once=~/.config/mango/scripts/idle.sh

# night light
exec=~/.config/mango/scripts/restart-wlsunset.sh

# wallpaper
exec-once=random-wallpaper

# clipboard
exec-once=wl-clip-persist --clipboard regular --reconnect-tries 0
exec-once=wl-paste --type text --watch cliphist store


# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.5
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
cursor_hide_timeout=8
drag_tile_to_tile=1
drag_tile_small=1
