# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+shift,r,reload_config

# change lang layout
bind=SUPER,space,switch_keyboard_layout

# change wallpaper
bind=SUPER+Shift,w,spawn,cycle-wallpaper

# network menu
bind=SUPER+Shift,n,spawn,networkmanager_dmenu

# audio
bind=None,XF86AudioMute,spawn,pactl set-sink-mute \@DEFAULT_SINK@ toggle
bind=None,XF86AudioLowerVolume,spawn,volume-down
bind=Shift,XF86AudioLowerVolume,spawn,volume-down extreme
bind=Alt,XF86AudioLowerVolume,spawn,volume-down precise
bind=None,XF86AudioRaiseVolume,spawn,volume-up
bind=Shift,XF86AudioRaiseVolume,spawn,volume-up extreme
bind=Alt,XF86AudioRaiseVolume,spawn,volume-up precise
bind=None,XF86AudioPlay,spawn,toggle-play

# brightness
bind=None,XF86MonBrightnessDown,spawn,brightnessctl set 10%-
bind=Alt,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=None,XF86MonBrightnessUp,spawn,brightnessctl set 10%+
bind=Alt,XF86MonBrightnessUp,spawn,brightnessctl set 5%+

# music
bind=SUPER,p,spawn,toggle-play
bind=SUPER,comma,spawn,prev-song
bind=SUPER,period,spawn,next-song
bind=SUPER,m,spawn,play-next
bind=SUPER+Shift,m,spawn,select-play-next

# screanshot
bind=None,Print,spawn,grim
bind=Shift,Print,spawn,grim -g "$(slurp)"

# menu and terminal
bind=SUPER,d,spawn,fuzzel
bind=SUPER,Return,spawn,foot
bind=SUPER+Shift,Return,toggle_named_scratchpad,none,st-foot,foot --app-id st-foot

# exit
bind=SUPER+ctrl+shift,e,quit

bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
# bind=ALT,Tab,toggleoverview,
bind=SUPER,backslash,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
# bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
circle_layout=tile,scroller,grid,vertical_scroller
bind=SUPER,n,switch_layout

# tag switching
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=SUPER+Shift,1,tag,1,0
bind=SUPER+Shift,2,tag,2,0
bind=SUPER+Shift,3,tag,3,0
bind=SUPER+Shift,4,tag,4,0
bind=SUPER+Shift,5,tag,5,0
bind=SUPER+Shift,6,tag,6,0
bind=SUPER+Shift,7,tag,7,0
bind=SUPER+Shift,8,tag,8,0
bind=SUPER+Shift,9,tag,9,0
# silent switch
bind=SUPER+Ctrl,1,tagsilent,1
bind=SUPER+Ctrl,2,tagsilent,1
bind=SUPER+Ctrl,3,tagsilent,1
bind=SUPER+Ctrl,4,tagsilent,1
bind=SUPER+Ctrl,5,tagsilent,1
bind=SUPER+Ctrl,6,tagsilent,1
bind=SUPER+Ctrl,7,tagsilent,1
bind=SUPER+Ctrl,8,tagsilent,1
bind=SUPER+Ctrl,9,tagsilent,1

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=SUPER+CTRL,k,movewin,+0,-20
bind=SUPER+CTRL,j,movewin,+0,+20
bind=SUPER+CTRL,h,movewin,-20,+0
bind=SUPER+CTRL,l,movewin,+20,+0
bind=SUPER+CTRL+Shift,k,movewin,+0,-50
bind=SUPER+CTRL+Shift,j,movewin,+0,+50
bind=SUPER+CTRL+Shift,h,movewin,-50,+0
bind=SUPER+CTRL+Shift,l,movewin,+50,+0

# resize windows
bind=SUPER,r,setkeymode,resize
keymode=resize
bind=None,k,resizewin,+0,-25
bind=None,j,resizewin,+0,+25
bind=None,h,resizewin,-25,+0
bind=None,l,resizewin,+25,+0
bind=Shift,k,resizewin,+0,-50
bind=Shift,j,resizewin,+0,+50
bind=Shift,h,resizewin,-50,+0
bind=Shift,l,resizewin,+50,+0
bind=NONE,Return,setkeymode,default
bind=NONE,Escape,setkeymode,default
bind=NONE,Caps_Lock,setkeymode,default

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Gesture
gesturebind=none,right,4,viewtoleft_have_client
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview

gesturebind=none,right,3,focusdir,right
gesturebind=none,left,3,focusdir,left
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

# switch binds
switchbind=fold,spawn,hyprlock
