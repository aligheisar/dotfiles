# window rule
windowrule=tags:1,appid:zen
windowrule=tags:2,appid:code
windowrule=tags:2,appid:dev.zed.Zed
windowrule=tags:3,appid:helium
windowrule=isnamedscratchpad:1,appid:st-foot

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# layer rule
layerrule=animation_type_open:fade,animation_type_close:fade,layer_name:waybar
layerrule=animation_type_open:zoom,animation_type_close:zoom,layer_name:launcher
layerrule=noanim:1,noblur:1,layer_name:selection

# mega
windowrule=isfloating:1,animation_type_open:fade,width:400,offsetx:100%,offsety:-100%,appid:nz.cokjmega.megasync
